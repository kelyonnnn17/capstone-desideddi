<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeSIDE DDI | AI Prediction Agent</title>
    <!-- Modern Web Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="glass-container">
        
        <header>
            <div class="logo-box">
                <h1>DeSIDE-<span>DDI</span></h1>
            </div>
            <p class="subtitle">Deep Learning Side-Effect Discovery Engine</p>
        </header>

        <section class="predictor-module">
            
            <div class="drug-selectors">
                <div class="input-group">
                    <label for="drug1">Molecule Alpha</label>
                    <select id="drug1" class="glass-select" disabled>
                        <option value="">Loading Database...</option>
                    </select>
                </div>

                <div class="connector">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>

                <div class="input-group">
                    <label for="drug2">Molecule Beta</label>
                    <select id="drug2" class="glass-select" disabled>
                        <option value="">Loading Database...</option>
                    </select>
                </div>
            </div>

            <button id="predict-btn" class="glass-btn" disabled>
                <span class="btn-text">Compute Interaction Vector</span>
                <span class="spinner hidden"></span>
            </button>
            
        </section>

        <!-- Dynamic Results Section -->
        <section id="results-panel" class="results-container hidden">
            <h2 class="results-title">Projected Anomalies</h2>
            <div class="results-meta" id="results-meta"></div>
            
            <div style="margin-bottom: 30px; display: flex; justify-content: flex-start;">
                <button id="export-llm-btn" class="glass-btn" style="padding: 12px 24px; font-size: 1rem; width: auto;">
                    <span class="btn-text">Export LLM Payload JSON</span>
                    <span class="spinner hidden"></span>
                </button>
                <button id="analyze-llm-btn" class="glass-btn" style="padding: 12px 24px; font-size: 1rem; width: auto; margin-left: 12px;">
                    <span class="btn-text">Analyze with BioMistral</span>
                    <span class="spinner hidden"></span>
                </button>
            </div>

            <div id="llm-analysis-panel" class="hidden" style="margin-bottom: 24px;">
                <h3 style="margin-bottom: 12px;">LLM Adjudication</h3>
                <div id="llm-analysis-meta" style="margin-bottom: 12px; color: var(--text-secondary);"></div>
                <pre id="llm-analysis-output" style="white-space: pre-wrap; background: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.5); border-radius: 16px; padding: 18px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.95rem; line-height: 1.5;"></pre>
            </div>
            
            <div class="cards-grid" id="cards-grid">
                <!-- Javascript maps the API data here -->
            </div>
            <div id="graph-container" style="width:100%; height:600px;"></div>
            <script src="https://d3js.org/d3.v7.min.js"></script>
        </section>
        
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
async function loadGraph(drug1, drug2) {
    const res = await fetch('/api/graph', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ drug1, drug2 })
    });

    const data = await res.json();
    renderGraph(data);
}
function dragstarted(event, d) {
    if (!event.active) event.subject.fx = event.subject.x;
    if (!event.active) event.subject.fy = event.subject.y;
}

function dragged(event, d) {
    event.subject.fx = event.x;
    event.subject.fy = event.y;
}

function dragended(event, d) {
    if (!event.active) {
        event.subject.fx = null;
        event.subject.fy = null;
    }
}
function renderGraph(graphData) {
    const width = 800;
    const height = 600;

    d3.select("#graph-container").html("");

    const svg = d3.select("#graph-container")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    const simulation = d3.forceSimulation(graphData.nodes)
        .force("link", d3.forceLink(graphData.links).id(d => d.id).distance(120))
        .force("charge", d3.forceManyBody().strength(-300))
        .force("center", d3.forceCenter(width / 2, height / 2));

    const link = svg.append("g")
        .selectAll("line")
        .data(graphData.links)
        .enter()
        .append("line")
        .attr("stroke", "#aaa");

    const node = svg.append("g")
        .selectAll("circle")
        .data(graphData.nodes)
        .enter()
        .append("circle")
        .attr("r", 8)
        .attr("fill", d => {
            if (d.type === "drug") return "red";
            if (d.type === "gene") return "blue";
            if (d.type === "side_effect") return "orange";
            return "gray";
        })
        .call(d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended));
            
    node.append("title")
        .text(d => `${d.id} (${d.type})`);
    const label = svg.append("g")
        .selectAll("text")
        .data(graphData.nodes)
        .enter()
        .append("text")
        .text(d => d.id)
        .attr("font-size", 10);

    simulation.on("tick", () => {
        link
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        node
            .attr("cx", d => d.x)
            .attr("cy", d => d.y);

        label
            .attr("x", d => d.x + 10)
            .attr("y", d => d.y);
    });
}
</script>
</body>
</html>
